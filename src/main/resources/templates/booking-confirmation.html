<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f4f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 560px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .header {
      background: linear-gradient(135deg, #0A0F1E, #1A2235);
      padding: 32px;
      text-align: center;
    }

    .header h1 {
      color: #C9A84C;
      font-size: 24px;
      margin: 0;
      font-family: Georgia, serif;
    }

    .header p {
      color: #94A3B8;
      font-size: 14px;
      margin-top: 4px;
    }

    .body {
      padding: 32px;
      color: #1e293b;
    }

    .body h2 {
      font-size: 20px;
      margin: 0 0 16px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #e2e8f0;
      font-size: 14px;
    }

    .detail-label {
      color: #64748b;
    }

    .detail-value {
      font-weight: 600;
    }

    .total {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      margin-top: 20px;
    }

    .total .amount {
      font-size: 28px;
      font-weight: 700;
      color: #15803d;
    }

    .footer {
      text-align: center;
      padding: 20px;
      color: #94A3B8;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>🏨 Grand Reserve</h1>
      <p>Booking Confirmation</p>
    </div>
    <div class="body">
      <h2>Hello, %s!</h2>
      <p>Your reservation has been confirmed. Here are the details:</p>
      <div class="detail-row">
        <span class="detail-label">Room</span>
        <span class="detail-value">%s — %s</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Check-in</span>
        <span class="detail-value">%s</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Check-out</span>
        <span class="detail-value">%s</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Rate</span>
        <span class="detail-value">LKR %.2f / night</span>
      </div>
      <div class="total">
        <div style="color:#64748b;font-size:12px;margin-bottom:4px;">TOTAL</div>
        <div class="amount">LKR %.2f</div>
      </div>
    </div>
    <div class="footer">
      Thank you for choosing Grand Reserve Hotel.
    </div>
  </div>
</body>

</html>

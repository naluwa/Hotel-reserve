<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f4f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 560px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .header {
      background: linear-gradient(135deg, #0A0F1E, #1A2235);
      padding: 32px;
      text-align: center;
    }

    .header h1 {
      color: #C9A84C;
      font-size: 24px;
      margin: 0;
      font-family: Georgia, serif;
    }

    .header p {
      color: #F87171;
      font-size: 14px;
      margin-top: 4px;
    }

    .body {
      padding: 32px;
      color: #1e293b;
    }

    .body h2 {
      font-size: 20px;
      margin: 0 0 16px;
    }

    .notice {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      margin-top: 16px;
      color: #b91c1c;
    }

    .footer {
      text-align: center;
      padding: 20px;
      color: #94A3B8;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>🏨 Grand Reserve</h1>
      <p>Booking Cancellation</p>
    </div>
    <div class="body">
      <h2>Hello, %s</h2>
      <p>We are writing to inform you that your reservation has been cancelled.</p>
      <div class="notice">
        <strong>Booking for %s — %s has been cancelled.</strong>
        <br />If you believe this was a mistake, please contact us.
      </div>
    </div>
    <div class="footer">
      Grand Reserve Hotel — We hope to welcome you again.
    </div>
  </div>
</body>

</html>

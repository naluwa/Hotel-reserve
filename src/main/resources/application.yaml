spring:
  application:
    name: hotel-reservation

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/hotel_reservation}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:DefaultDevSecretKeyThatIsLongEnoughForHS256AlgorithmOnly}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  mail:
    from: ${MAIL_FROM:noreply@grandreserve.com}
